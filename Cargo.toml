[package]
name = "strider"
version = "0.1.0"
edition = "2021"

[dependencies]
confy = "0.6.1"
poise = { version = "0.6.1", features = ["default"] }
serenity = { version = "0.12.2", features = ["default"] }
tokio = { version = "1.40.0", features = ["default", "rt-multi-thread", "signal"] }
tokio-tungstenite = { version = "0.24.0", features = ["default"] }
env_logger = { version = "0.11.5", features = ["default"] }
chrono = { version = "0.4.38", features = [ "serde"]}
chrono-tz = "0.10.0"
reqwest = { version = "0.12.8", features = ["default", "json"] }
sys-info = "0.9.1"
sled = "0.34.7"
image = "0.25.2"
imageproc = "0.25.0"
ab_glyph = "0.2.29"
clokwerk = "0.4.0"
circular-buffer = "0.1.9"
tempfile = "3.13.0"
anyhow = "1.0.89"
once_cell = "1.20.2"
pretty_env_logger = "0.5.0"
log = "0.4.22"
rss = "2.0.9"
directories = "5.0.1"
bincode = { version = "1.3.3"}
serde = { version = "1.0.210", features = ["derive"] }
rand = "0.8.5"
feed-rs = "2.1.1"
serde_json = "1.0.128"
rayon = "1.10.0"
futures = { version = "0.3.31", features = ["default"] }