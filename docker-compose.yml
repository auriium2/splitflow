services:
  redis:
    image: "redis:latest"
    networks:
      - app-network
    ports:
      - "6379:6379"
    restart: unless-stopped
  mongodb:
    image: "mongo:latest"
    networks:
      - app-network
    ports:
      - "27017:27017"
    restart: unless-stopped
    environment: #todo: .env
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: DHOeETe48VOOg4WN
  auto-rsa:
    container_name: auto-rsa
    build: ./splitflow-buy
    ports:
      - "8080:8080"
    env_file:
      - .env
    tty: true
    volumes:
      - ./creds:/app/creds
networks:
  app-network:
    driver: bridge

