services:
  redis:
    image: "redis:latest"
    container_name: "redis-container"
    ports:
      - "6379:6379"
    restart: unless-stopped
  auto-rsa:
    container_name: auto-rsa
    build: ./splitflow-buy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    tty: true
    volumes:
      - ./creds:/app/creds

